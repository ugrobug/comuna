proxy_cache_path /tmp/nginx-cache levels=1:2 keys_zone=frontend_cache:20m max_size=512m inactive=60m use_temp_path=off;
proxy_cache_path /tmp/nginx-api-cache levels=1:2 keys_zone=api_cache:20m max_size=512m inactive=10m use_temp_path=off;
# Настройка SSL / серты в кабинете JINO 
# Jino терминирует TLS и проксирует на VPS по HTTP — реальную схему для приложения берём из заголовка.
# Доверяем клиентский IP из X-Forwarded-For только входному прокси Jino.
set_real_ip_from 217.107.219.119;
real_ip_header X-Forwarded-For;
real_ip_recursive on;

map $http_x_forwarded_proto $client_forwarded_proto {
  default $http_x_forwarded_proto;
  ""      http;
}

map $http_user_agent $bulk_crawler_blocked {
  default 0;
  ~*(Bytespider|SemrushBot) 1;
}

map $http_user_agent $ai_crawler_key {
  default "";
  ~*ClaudeBot "claude";
  ~*GPTBot "gpt";
  ~*meta-externalagent "meta";
}

limit_req_zone $ai_crawler_key zone=ai_crawlers:1m rate=20r/m;

map $request_uri $startupplanner_redirect {
  default "";
  "/?p=644" "https://tambur.pub/b/post/20531-kak-by-dzhon-datton-upravlyal-korporatsiey";
  "/?p=702" "https://tambur.pub/b/post/20532-byli-i-drugie-uroki-zabytyh-geroev";
  "/?p=307" "https://tambur.pub/b/post/20533-ya-zapolnil-biznes-kanvas-chto-dalshe";
  "/?page_id=283" "https://tambur.pub/comuns/business";
  "/?page_id=122&query-52-page=2" "https://tambur.pub/comuns/startup-planner";
  "/?page_id=122&query-52-page=1" "https://tambur.pub/comuns/startup-planner";
  "/" "https://tambur.pub/comuns/startup-planner";
  "/?p=556" "https://tambur.pub/b/post/20510-spisok-ploshchadok-dlya-kraudfayndinga-i-kraudinvestinga";
  "/?p=233" "https://tambur.pub/b/post/20512-anons-proekta-i-pervye-posledovateli";
  "/?p=106" "https://tambur.pub/b/post/20513-tsennostnoe-predlozhenie";
  "/?p=104" "https://tambur.pub/b/post/20514-urovni-trl-mrl-crl";
  "/?p=102" "https://tambur.pub/b/post/20516-urovni-trl";
  "/?p=100" "https://tambur.pub/b/post/20517-urovni-mrl";
  "/?p=98" "https://tambur.pub/b/post/20519-urovni-crl";
  "/?p=96" "https://tambur.pub/b/post/20522-problemnye-intervyu";
  "/?p=94" "https://tambur.pub/b/post/20523-plan-po-privlecheniyu-investitsiy";
  "/?p=92" "https://tambur.pub/b/post/20524-otsenka-rynka";
  "/?p=90" "https://tambur.pub/b/post/20527-model-hook";
  "/?p=88" "https://tambur.pub/b/post/20528-gipotezy-hadi";
  "/?p=86" "https://tambur.pub/b/post/20529-biznes-kanvas";
  "/?p=82" "https://tambur.pub/b/post/20530-unit-ekonomika";
  "/?page_id=908" "https://tambur.pub/b/post/20535-pokupka-i-dostavka-planera";
  "/?page_id=917" "https://tambur.pub/b/post/20534-ob-avtore-planera";
}

server {
  listen 80 default_server;
  listen [::]:80 default_server;
  server_name _;

  return 404;
}

server {
  listen 80;
  listen [::]:80;
  server_name comuna.ru www.comuna.ru;

  location / {
    return 301 https://tambur.pub$request_uri;
  }
}

server {
  listen 80;
  listen [::]:80;
  server_name startupplanner.ru www.startupplanner.ru;

  if ($startupplanner_redirect != "") {
    return 301 $startupplanner_redirect;
  }

  location / {
    return 301 https://tambur.pub/comuns/startup-planner;
  }
}

server {
  listen 80;
  listen [::]:80;
  server_name tambur.pub www.tambur.pub;

  if ($bulk_crawler_blocked) {
    return 403;
  }

  if ($host = www.tambur.pub) {
    return 301 https://tambur.pub$request_uri;
  }

  gzip on;
  gzip_vary on;
  gzip_comp_level 5;
  gzip_min_length 1024;
  gzip_types
    text/plain
    text/css
    text/xml
    text/javascript
    application/javascript
    application/json
    application/ld+json
    application/rss+xml
    application/xml
    image/svg+xml;

  resolver 127.0.0.11 valid=10s ipv6=off;
  resolver_timeout 5s;
  set $backend_origin http://backend:8000;
  set $frontend_origin http://frontend:3000;
  set $security_csp "default-src 'self'; base-uri 'self'; object-src 'none'; frame-ancestors 'self'; form-action 'self'; img-src 'self' data: blob: https:; media-src 'self' data: blob: https:; font-src 'self' data: https:; style-src 'self' 'unsafe-inline' https:; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://telegram.org https://oauth.telegram.org https://vk.com https://*.vk.com https://accounts.google.com https://appleid.cdn-apple.com https://mc.yandex.ru https://www.googletagmanager.com https://www.google-analytics.com https://pagead2.googlesyndication.com https://partner.googleadservices.com; connect-src 'self' https: wss:; frame-src 'self' https://telegram.org https://oauth.telegram.org https://vk.com https://*.vk.com https://vk.ru https://*.vk.ru https://accounts.google.com https://appleid.apple.com https://www.youtube.com https://www.youtube-nocookie.com https://youtube.com https://player.vimeo.com https://open.spotify.com https://www.openstreetmap.org https://googleads.g.doubleclick.net https://tpc.googlesyndication.com https://pagead2.googlesyndication.com; worker-src 'self' blob:";

  add_header Content-Security-Policy $security_csp always;
  add_header Strict-Transport-Security "max-age=31536000" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header X-Frame-Options "SAMEORIGIN" always;
  add_header Cross-Origin-Opener-Policy "same-origin-allow-popups" always;
  add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=()" always;

  # Security headers are owned by nginx in production. Hide upstream copies
  # to avoid browsers applying an older, stricter CSP in addition to this one.
  proxy_hide_header Content-Security-Policy;
  proxy_hide_header X-Frame-Options;
  proxy_hide_header Permissions-Policy;

  location /media/ {
    alias /var/www/media/;
    expires 30d;
    add_header Cache-Control "public, max-age=2592000";
    add_header Content-Security-Policy $security_csp always;
    add_header Strict-Transport-Security "max-age=31536000" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Cross-Origin-Opener-Policy "same-origin-allow-popups" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=()" always;
  }

  location /static/ {
    alias /var/www/static/;
    expires 1y;
    add_header Cache-Control "public, max-age=31536000, immutable";
    add_header Content-Security-Policy $security_csp always;
    add_header Strict-Transport-Security "max-age=31536000" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Cross-Origin-Opener-Policy "same-origin-allow-popups" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=()" always;
  }

  location /_app/immutable/ {
    proxy_pass $frontend_origin;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $client_forwarded_proto;
    expires 1y;
    add_header Cache-Control "public, max-age=31536000, immutable";
    add_header Content-Security-Policy $security_csp always;
    add_header Strict-Transport-Security "max-age=31536000" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Cross-Origin-Opener-Policy "same-origin-allow-popups" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=()" always;
  }

  location /font/ {
    proxy_pass $frontend_origin;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $client_forwarded_proto;
    expires 1y;
    add_header Cache-Control "public, max-age=31536000, immutable";
    add_header Content-Security-Policy $security_csp always;
    add_header Strict-Transport-Security "max-age=31536000" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Cross-Origin-Opener-Policy "same-origin-allow-popups" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=()" always;
  }

  location /_app/ {
    proxy_pass $frontend_origin;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $client_forwarded_proto;
    expires 1d;
    add_header Cache-Control "public, max-age=86400";
    add_header Content-Security-Policy $security_csp always;
    add_header Strict-Transport-Security "max-age=31536000" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Cross-Origin-Opener-Policy "same-origin-allow-popups" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=()" always;
  }

  location = /api/auth/methods/ {
    proxy_pass $backend_origin;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $remote_addr;
    proxy_set_header X-Forwarded-Proto $client_forwarded_proto;
    proxy_cache_bypass 1;
    proxy_no_cache 1;
    add_header Cache-Control "private, no-store, max-age=0" always;
  }

  location /api/ {
    client_max_body_size 12m;
    proxy_pass $backend_origin;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $client_forwarded_proto;
    proxy_cache api_cache;
    proxy_cache_methods GET HEAD;
    proxy_cache_key $scheme$proxy_host$request_uri;
    proxy_cache_valid 200 30s;
    proxy_cache_use_stale error timeout updating http_500 http_502 http_503 http_504;
    proxy_cache_bypass $cookie_sessionid $cookie_csrftoken $cookie_comuna_site_token $http_authorization;
    proxy_no_cache $cookie_sessionid $cookie_csrftoken $cookie_comuna_site_token $http_authorization $upstream_http_set_cookie;
    add_header X-API-Cache-Status $upstream_cache_status;
  }

  location /admin/ {
    proxy_pass $backend_origin$request_uri;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $client_forwarded_proto;
  }

  location /tg/ {
    proxy_pass $backend_origin$request_uri;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $client_forwarded_proto;
  }

  location = /sitemap-authors.xml {
    return 301 /sitemap.xml;
  }

  location ~ ^/sitemap-posts-[0-9]+\.xml$ {
    return 301 /sitemap.xml;
  }

  location ~ ^/sitemap(?:-[a-z0-9-]+)?\.xml$ {
    root /var/www/sitemaps;
    gzip_static on;
    try_files $uri =404;
    expires 5m;
  }

  location / {
    root /var/www/static;
    error_page 418 = @frontend;
    if ($cookie_sessionid != "") { return 418; }
    if ($cookie_csrftoken != "") { return 418; }
    if ($cookie_comuna_site_token != "") { return 418; }
    if ($http_authorization != "") { return 418; }
    try_files /html-snapshots$uri/index.html @frontend;
  }

  location @frontend {
    limit_req zone=ai_crawlers burst=5 nodelay;
    limit_req_status 429;
    proxy_pass $frontend_origin;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $client_forwarded_proto;
    proxy_cache frontend_cache;
    proxy_cache_methods GET HEAD;
    proxy_cache_key $scheme$proxy_host$request_uri;
    proxy_cache_valid 200 60s;
    proxy_cache_valid 404 10s;
    proxy_cache_use_stale error timeout updating http_500 http_502 http_503 http_504;
    proxy_cache_bypass $cookie_sessionid $cookie_csrftoken $cookie_comuna_site_token $http_authorization;
    proxy_no_cache $cookie_sessionid $cookie_csrftoken $cookie_comuna_site_token $http_authorization $upstream_http_set_cookie;
    add_header X-Cache-Status $upstream_cache_status;
    add_header Content-Security-Policy $security_csp always;
    add_header Strict-Transport-Security "max-age=31536000" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Cross-Origin-Opener-Policy "same-origin-allow-popups" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=()" always;
    proxy_buffer_size 128k;
    proxy_buffers 4 256k;
    proxy_busy_buffers_size 256k;
  }
}

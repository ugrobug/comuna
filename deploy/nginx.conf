proxy_cache_path /tmp/nginx-cache levels=1:2 keys_zone=frontend_cache:20m max_size=512m inactive=60m use_temp_path=off;
proxy_cache_path /tmp/nginx-api-cache levels=1:2 keys_zone=api_cache:20m max_size=512m inactive=10m use_temp_path=off;
# Настройка SSL / серты в кабинете JINO 
# Jino терминирует TLS и проксирует на VPS по HTTP — реальную схему для приложения берём из заголовка.
map $http_x_forwarded_proto $client_forwarded_proto {
  default $http_x_forwarded_proto;
  ""      http;
}

server {
  listen 80 default_server;
  listen [::]:80 default_server;
  server_name _;

  return 404;
}

server {
  listen 80;
  listen [::]:80;
  server_name comuna.ru www.comuna.ru;

  location / {
    return 301 https://tambur.pub$request_uri;
  }
}

server {
  listen 80;
  listen [::]:80;
  server_name tambur.pub www.tambur.pub;

  gzip on;
  gzip_vary on;
  gzip_comp_level 5;
  gzip_min_length 1024;
  gzip_types
    text/plain
    text/css
    text/xml
    text/javascript
    application/javascript
    application/json
    application/ld+json
    application/rss+xml
    application/xml
    image/svg+xml;

  set $security_csp "default-src 'self'; base-uri 'self'; object-src 'none'; frame-ancestors 'self'; form-action 'self'; img-src 'self' data: blob: https:; media-src 'self' data: blob: https:; font-src 'self' data: https:; style-src 'self' 'unsafe-inline' https:; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://telegram.org https://oauth.telegram.org https://vk.com https://*.vk.com https://mc.yandex.ru https://www.googletagmanager.com https://www.google-analytics.com; connect-src 'self' https: wss:; frame-src 'self' https://telegram.org https://oauth.telegram.org https://vk.com https://*.vk.com https://www.youtube.com https://www.youtube-nocookie.com https://youtube.com https://player.vimeo.com https://open.spotify.com; worker-src 'self' blob:";

  add_header Content-Security-Policy $security_csp always;
  add_header Strict-Transport-Security "max-age=31536000" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header X-Frame-Options "SAMEORIGIN" always;
  add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=()" always;

  location /media/ {
    alias /var/www/media/;
    expires 30d;
    add_header Cache-Control "public, max-age=2592000";
    add_header Content-Security-Policy $security_csp always;
    add_header Strict-Transport-Security "max-age=31536000" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=()" always;
  }

  location /static/ {
    alias /var/www/static/;
    expires 1y;
    add_header Cache-Control "public, max-age=31536000, immutable";
    add_header Content-Security-Policy $security_csp always;
    add_header Strict-Transport-Security "max-age=31536000" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=()" always;
  }

  location /_app/immutable/ {
    proxy_pass http://frontend:3000;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $client_forwarded_proto;
    expires 1y;
    add_header Cache-Control "public, max-age=31536000, immutable";
    add_header Content-Security-Policy $security_csp always;
    add_header Strict-Transport-Security "max-age=31536000" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=()" always;
  }

  location /font/ {
    proxy_pass http://frontend:3000;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $client_forwarded_proto;
    expires 1y;
    add_header Cache-Control "public, max-age=31536000, immutable";
    add_header Content-Security-Policy $security_csp always;
    add_header Strict-Transport-Security "max-age=31536000" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=()" always;
  }

  location /_app/ {
    proxy_pass http://frontend:3000;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $client_forwarded_proto;
    expires 1d;
    add_header Cache-Control "public, max-age=86400";
    add_header Content-Security-Policy $security_csp always;
    add_header Strict-Transport-Security "max-age=31536000" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=()" always;
  }

  location /api/ {
    client_max_body_size 12m;
    proxy_pass http://backend:8000;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $client_forwarded_proto;
    proxy_cache api_cache;
    proxy_cache_methods GET HEAD;
    proxy_cache_key $scheme$proxy_host$request_uri;
    proxy_cache_valid 200 30s;
    proxy_cache_use_stale error timeout updating http_500 http_502 http_503 http_504;
    proxy_cache_bypass $cookie_sessionid $cookie_csrftoken $cookie_comuna_site_token $http_authorization;
    proxy_no_cache $cookie_sessionid $cookie_csrftoken $cookie_comuna_site_token $http_authorization $upstream_http_set_cookie;
    add_header X-API-Cache-Status $upstream_cache_status;
  }

  location /admin/ {
    proxy_pass http://backend:8000/admin/;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $client_forwarded_proto;
  }

  location /tg/ {
    proxy_pass http://backend:8000/tg/;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $client_forwarded_proto;
  }

  location ~ ^/sitemap(-[a-z0-9-]+)?\.xml$ {
    proxy_pass http://backend:8000;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $client_forwarded_proto;
  }

  location / {
    root /var/www/static;
    error_page 418 = @frontend;
    if ($cookie_sessionid != "") { return 418; }
    if ($cookie_csrftoken != "") { return 418; }
    if ($cookie_comuna_site_token != "") { return 418; }
    if ($http_authorization != "") { return 418; }
    try_files /html-snapshots$uri/index.html @frontend;
  }

  location @frontend {
    proxy_pass http://frontend:3000;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $client_forwarded_proto;
    proxy_cache frontend_cache;
    proxy_cache_methods GET HEAD;
    proxy_cache_key $scheme$proxy_host$request_uri;
    proxy_cache_valid 200 60s;
    proxy_cache_valid 404 10s;
    proxy_cache_use_stale error timeout updating http_500 http_502 http_503 http_504;
    proxy_cache_bypass $cookie_sessionid $cookie_csrftoken $cookie_comuna_site_token $http_authorization;
    proxy_no_cache $cookie_sessionid $cookie_csrftoken $cookie_comuna_site_token $http_authorization $upstream_http_set_cookie;
    add_header X-Cache-Status $upstream_cache_status;
    add_header Content-Security-Policy $security_csp always;
    add_header Strict-Transport-Security "max-age=31536000" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=()" always;
    proxy_buffer_size 128k;
    proxy_buffers 4 256k;
    proxy_busy_buffers_size 256k;
  }
}

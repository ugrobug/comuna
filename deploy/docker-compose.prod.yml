x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

services:
  db:
    image: postgres:16
    restart: unless-stopped
    logging: *default-logging
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    
    volumes:
      - db_data:/var/lib/postgresql/data

  mysql57:
    image: mysql:5.7
    restart: unless-stopped
    logging: *default-logging
    ports:
      - "127.0.0.1:3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL57_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_ROMAWHO_DB}
      MYSQL_USER: ${MYSQL_ROMAWHO_USER}
      MYSQL_PASSWORD: ${MYSQL_ROMAWHO_PASSWORD}
    volumes:
      - mysql57_data:/var/lib/mysql
      - ./mysql57-init:/docker-entrypoint-initdb.d:ro

  backend:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.backend
    restart: unless-stopped
    logging: *default-logging
    env_file:
      - .env.backend
    environment:
      SITEMAP_OUTPUT_DIR: /app/sitemaps
    extra_hosts:
      - "api.telegram.org:149.154.167.220"
      - "oauth.telegram.org:149.154.167.220"
    depends_on:
      - db
    volumes:
      - media_data:/app/media
      - static_data:/app/staticfiles
      - sitemap_data:/app/sitemaps
      - ./secrets:/app/secrets:ro

  sitemap-materializer:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.backend
    restart: unless-stopped
    logging: *default-logging
    command: >-
      sh -c "until python -u manage.py materialize_sitemaps; do sleep 10; done;
      while true; do python -u manage.py materialize_sitemaps || true; sleep 1200; done"
    env_file:
      - .env.backend
    environment:
      TELEGRAM_USE_POLLING: "0"
      SITEMAP_OUTPUT_DIR: /app/sitemaps
    depends_on:
      - db
    volumes:
      - sitemap_data:/app/sitemaps
    healthcheck:
      test: ["CMD-SHELL", "test -s /app/sitemaps/sitemap.xml"]
      interval: 10s
      timeout: 3s
      retries: 30
      start_period: 10s

  public-book-reminders:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.backend
    restart: unless-stopped
    logging: *default-logging
    command: sh -c "while true; do python manage.py send_public_book_reminders_due || true; sleep 60; done"
    env_file:
      - .env.backend
    environment:
      TELEGRAM_USE_POLLING: "0"
    extra_hosts:
      - "api.telegram.org:149.154.167.220"
      - "oauth.telegram.org:149.154.167.220"
    depends_on:
      - db
    volumes:
      - ./secrets:/app/secrets:ro

  film-journey-deliveries:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.backend
    restart: unless-stopped
    logging: *default-logging
    command: sh -c "while true; do python manage.py send_1001_films_due || true; sleep 60; done"
    env_file:
      - .env.backend
    environment:
      TELEGRAM_USE_POLLING: "0"
    extra_hosts:
      - "api.telegram.org:149.154.167.220"
      - "oauth.telegram.org:149.154.167.220"
    depends_on:
      - db
    volumes:
      - ./secrets:/app/secrets:ro

  grouped-notifications:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.backend
    restart: unless-stopped
    logging: *default-logging
    command: sh -c "while true; do python manage.py send_grouped_notifications_due || true; sleep 60; done"
    env_file:
      - .env.backend
    environment:
      TELEGRAM_USE_POLLING: "0"
    extra_hosts:
      - "api.telegram.org:149.154.167.220"
      - "oauth.telegram.org:149.154.167.220"
    depends_on:
      - db
    volumes:
      - ./secrets:/app/secrets:ro

  content-translation-tasks:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.backend
    restart: unless-stopped
    logging: *default-logging
    command: sh -c "worker() { while true; do python -u manage.py process_translation_tasks --limit 50 --run-timeout 720 --loop --interval 10 || true; sleep 10; done; }; reconcile() { while true; do python -u manage.py queue_missing_post_translation_tasks || true; sleep 21600; done; }; worker & worker & reconcile & wait"
    env_file:
      - .env.backend
    environment:
      TELEGRAM_USE_POLLING: "0"
    depends_on:
      - db
    volumes:
      - ./secrets:/app/secrets:ro

  frontend:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.frontend
    restart: unless-stopped
    logging: *default-logging
    env_file:
      - .env.frontend
    environment:
      INTERNAL_BACKEND_URL: http://backend:8000
    depends_on:
      - backend

  nginx:
    image: nginx:stable-alpine
    restart: unless-stopped
    logging: *default-logging
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - media_data:/var/www/media
      - static_data:/var/www/static
      - sitemap_data:/var/www/sitemaps:ro
    depends_on:
      backend:
        condition: service_started
      frontend:
        condition: service_started
      sitemap-materializer:
        condition: service_healthy

volumes:
  db_data:
  mysql57_data:
  media_data:
  static_data:
  sitemap_data:

services:
  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    
    volumes:
      - db_data:/var/lib/postgresql/data

  mysql57:
    image: mysql:5.7
    restart: unless-stopped
    ports:
      - "127.0.0.1:3306:3306"
    environment:
      MYSQL_ALLOW_EMPTY_PASSWORD: "yes"
      MYSQL_DATABASE: romawho_posl1
    volumes:
      - mysql57_data:/var/lib/mysql
      - ./mysql57-init:/docker-entrypoint-initdb.d:ro

  backend:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.backend
    restart: unless-stopped
    env_file:
      - .env.backend
    extra_hosts:
      - "api.telegram.org:149.154.167.220"
      - "oauth.telegram.org:149.154.167.220"
    depends_on:
      - db
    volumes:
      - media_data:/app/media
      - static_data:/app/staticfiles

  public-book-reminders:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.backend
    restart: unless-stopped
    command: sh -c "while true; do python manage.py send_public_book_reminders_due || true; sleep 60; done"
    env_file:
      - .env.backend
    extra_hosts:
      - "api.telegram.org:149.154.167.220"
      - "oauth.telegram.org:149.154.167.220"
    depends_on:
      - db

  film-journey-deliveries:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.backend
    restart: unless-stopped
    command: sh -c "while true; do python manage.py send_1001_films_due || true; sleep 60; done"
    env_file:
      - .env.backend
    extra_hosts:
      - "api.telegram.org:149.154.167.220"
      - "oauth.telegram.org:149.154.167.220"
    depends_on:
      - db

  frontend:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.frontend
    restart: unless-stopped
    env_file:
      - .env.frontend
    environment:
      INTERNAL_BACKEND_URL: http://backend:8000
    depends_on:
      - backend

  nginx:
    image: nginx:stable-alpine
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - media_data:/var/www/media
      - static_data:/var/www/static
    depends_on:
      - backend
      - frontend

volumes:
  db_data:
  mysql57_data:
  media_data:
  static_data:
